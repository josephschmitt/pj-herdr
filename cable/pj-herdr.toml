[metadata]
name = "pj-herdr"
description = "Find and open pj projects as herdr workspaces"
requirements = ["pj"]

[source]
command = [
  "pj --icons --ansi --shorten --sort alpha",
  "pj --icons --ansi --shorten --sort alpha --no-nested"
]
ansi = true
frecency = false

[preview]
command = "eza --tree --color=always \"$(echo {strip_ansi|split: :1} | sed 's|^~|$HOME|')\""

[keybindings]
enter = "actions:connect"
ctrl-n = "actions:new_workspace"
ctrl-e = "actions:edit"
ctrl-t = "actions:new_tab"
ctrl-r = ["actions:clear_cache", "reload_source"]

[actions.connect]
description = "Open as herdr workspace (switch if exists)"
command = "$HERDR_PLUGIN_ROOT/scripts/pj-connect.sh \"$(echo {strip_ansi|split: :1} | sed 's|^~|$HOME|')\""
mode = "execute"

[actions.new_workspace]
description = "Always create a new herdr workspace"
command = "$HERDR_PLUGIN_ROOT/scripts/pj-connect.sh --new \"$(echo {strip_ansi|split: :1} | sed 's|^~|$HOME|')\""
mode = "execute"

[actions.edit]
description = "Open in $EDITOR"
command = "$EDITOR \"$(echo {strip_ansi|split: :1} | sed 's|^~|$HOME|')\""
mode = "execute"

[actions.new_tab]
description = "Open in new herdr tab"
command = "herdr tab create --cwd \"$(echo {strip_ansi|split: :1} | sed 's|^~|$HOME|')\" --focus"
mode = "execute"

[actions.clear_cache]
description = "Clear pj cache"
command = "pj --clear-cache"
mode = "fork"
